<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SnapCal Signup</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #111111;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding-bottom: 40px;
    }
  </style>
</head>

<body>

  <div style="width:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">

    <div style="padding:24px 20px 0;">
      <div style="font-size:11px;color:#555;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px;">Step 1 of 1
      </div>
      <h1 style="font-size:26px;font-weight:800;color:#fff;margin:0 0 4px;">Create your profile</h1>
      <p style="font-size:13px;color:#555;margin:0 0 28px;">Let's personalize your experience</p>
    </div>

    <div style="padding:0 20px;display:flex;flex-direction:column;gap:14px;">

      <div>
        <label
          style="font-size:10px;color:#555;letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:6px;">Full
          name</label>
        <input id="name" type="text" placeholder="e.g. Juan dela Cruz"
          style="width:100%;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:13px 14px;color:#fff;font-size:14px;outline:none;box-sizing:border-box;"
          onfocus="this.style.borderColor='#AAFF00'" onblur="this.style.borderColor='#2a2a2a'">
      </div>

      <div>
        <label
          style="font-size:10px;color:#555;letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:6px;">Age
        </label>
        <input id="age" type="number" placeholder="e.g. 25"
          style="width:100%;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:13px 14px;color:#fff;font-size:14px;outline:none;box-sizing:border-box;"
          onfocus="this.style.borderColor='#AAFF00'" onblur="this.style.borderColor='#2a2a2a'">
      </div>

      <div>
        <label
          style="font-size:10px;color:#555;letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:8px;">Gender</label>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;" id="gender-group">
          <div class="gender-opt" data-val="male" onclick="selectOption('gender-group', this)"
            style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:12px;text-align:center;cursor:pointer;transition:all 0.15s;">
            <div style="font-size:20px;margin-bottom:4px;">♂</div>
            <div style="font-size:13px;color:#888;font-weight:600;">Male</div>
          </div>
          <div class="gender-opt" data-val="female" onclick="selectOption('gender-group', this)"
            style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:12px;text-align:center;cursor:pointer;transition:all 0.15s;">
            <div style="font-size:20px;margin-bottom:4px;">♀</div>
            <div style="font-size:13px;color:#888;font-weight:600;">Female</div>
          </div>
        </div>
      </div>

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div>
          <label
            style="font-size:10px;color:#555;letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:6px;">Weight
            (kg)</label>
          <input id="weight" type="number" placeholder="70" min="30" max="300"
            style="width:100%;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:13px 14px;color:#fff;font-size:14px;outline:none;box-sizing:border-box;"
            onfocus="this.style.borderColor='#AAFF00'" onblur="this.style.borderColor='#2a2a2a'">
        </div>
        <div>
          <label
            style="font-size:10px;color:#555;letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:6px;">Height
            (cm)</label>
          <input id="height" type="number" placeholder="170" min="100" max="250"
            style="width:100%;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:13px 14px;color:#fff;font-size:14px;outline:none;box-sizing:border-box;"
            onfocus="this.style.borderColor='#AAFF00'" onblur="this.style.borderColor='#2a2a2a'">
        </div>
      </div>

      <div>
        <label
          style="font-size:10px;color:#555;letter-spacing:1.5px;text-transform:uppercase;display:block;margin-bottom:8px;">Goal</label>
        <div style="display:flex;flex-direction:column;gap:8px;" id="goal-group">

          <div class="goal-opt" data-val="gain" onclick="selectOption('goal-group', this)"
            style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:13px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all 0.15s;">
            <div
              style="width:36px;height:36px;border-radius:10px;background:#222;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#AAFF00" stroke-width="2">
                <polyline points="23 6 13.5 15.5 8.5 10.5 1 18" />
                <polyline points="17 6 23 6 23 12" />
              </svg>
            </div>
            <div>
              <div style="font-size:13px;font-weight:700;color:#fff;">Gain weight</div>
              <div style="font-size:11px;color:#555;margin-top:1px;">Build muscle & increase mass</div>
            </div>
          </div>

          <div class="goal-opt" data-val="maintain" onclick="selectOption('goal-group', this)"
            style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:13px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all 0.15s;">
            <div
              style="width:36px;height:36px;border-radius:10px;background:#222;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#AAFF00" stroke-width="2">
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="16" />
                <line x1="8" y1="12" x2="16" y2="12" />
              </svg>
            </div>
            <div>
              <div style="font-size:13px;font-weight:700;color:#fff;">Maintain weight</div>
              <div style="font-size:11px;color:#555;margin-top:1px;">Stay at your current weight</div>
            </div>
          </div>

          <div class="goal-opt" data-val="lose" onclick="selectOption('goal-group', this)"
            style="background:#1a1a1a;border:1px solid #2a2a2a;border-radius:12px;padding:13px 16px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all 0.15s;">
            <div
              style="width:36px;height:36px;border-radius:10px;background:#222;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#AAFF00" stroke-width="2">
                <polyline points="23 18 13.5 8.5 8.5 13.5 1 6" />
                <polyline points="17 18 23 18 23 12" />
              </svg>
            </div>
            <div>
              <div style="font-size:13px;font-weight:700;color:#fff;">Lose weight</div>
              <div style="font-size:11px;color:#555;margin-top:1px;">Burn fat & slim down</div>
            </div>
          </div>

        </div>
      </div>

      <button onclick="submitSignup()"
        style="width:100%;background:#AAFF00;color:#111;font-size:15px;font-weight:800;border:none;border-radius:14px;padding:16px;cursor:pointer;letter-spacing:0.3px;margin-top:4px;">
        Get Started
      </button>

    </div>
  </div>

  <script>
    var selectedGender = "";
    var selectedGoal = "";

    function selectOption(groupId, el) {
      var group = document.getElementById(groupId);
      var opts = group.querySelectorAll('[class]');
      opts.forEach(function (o) {
        o.style.borderColor = '#2a2a2a';
        o.style.background = '#1a1a1a';
      });
      el.style.borderColor = '#AAFF00';
      el.style.background = '#1C2210';

      if (groupId === 'gender-group') {
        selectedGender = el.getAttribute('data-val');
      } else if (groupId === 'goal-group') {
        selectedGoal = el.getAttribute('data-val');
      }
    }

    function submitSignup() {
      var name = document.getElementById("name").value.trim();
      var weight = document.getElementById("weight").value.trim();
      var height = document.getElementById("height").value.trim();
      var age = document.getElementById("age").value.trim();

      if (!name) { alert("Please enter your name."); return; }
      if (!selectedGender) { alert("Please select your gender."); return; }
      if (!weight) { alert("Please enter your weight."); return; }
      if (!height) { alert("Please enter your height."); return; }
      if (!age) { alert("Please enter your age."); return; }
      if (!selectedGoal) { alert("Please select your goal."); return; }

      var data = JSON.stringify({
        name: name,
        gender: selectedGender,
        weight: weight,
        height: height,
        age: age,
        goal: selectedGoal
      });

      window.AppInventor.setWebViewString(data);
      window.location.href = "profile.html?name=" + encodeURIComponent(name);
    }
  </script>

</body>

</html>
