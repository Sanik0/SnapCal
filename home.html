<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SnapCal Home</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #111111;
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* Top Nav */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
    }

    .topbar .menu-icon {
      display: flex;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
    }

    .topbar .menu-icon span {
      display: block;
      width: 22px;
      height: 2px;
      background: #FFFFFF;
      border-radius: 2px;
    }

    .topbar .logo {
      font-size: 18px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 0.5px;
    }

    .topbar .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #333;
      border: 2px solid #AAFF00;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: #AAFF00;
    }

    /* Ring */
    .ring-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 8px 0 14px;
    }

    .ring-label {
      font-size: 10px;
      color: #666;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    .ring-outer {
      position: relative;
      width: 150px;
      height: 150px;
    }

    .ring-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
    }

    .ring-kcal {
      font-size: 30px;
      font-weight: 800;
      color: #AAFF00;
      line-height: 1;
    }

    .ring-unit {
      font-size: 10px;
      color: #666;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 3px;
    }

    /* Macros */
    .macros-section {
      padding: 0 20px 18px;
    }

    .section-sublabel {
      font-size: 10px;
      color: #555;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .macro-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 9px;
    }

    .macro-name {
      font-size: 12px;
      color: #777;
      width: 48px;
      flex-shrink: 0;
    }

    .macro-bar-track {
      flex: 1;
      height: 4px;
      background: #222;
      border-radius: 2px;
      overflow: hidden;
    }

    .macro-bar-fill {
      height: 100%;
      border-radius: 2px;
      background: #AAFF00;
    }

    .macro-val {
      font-size: 11px;
      color: #555;
      width: 66px;
      text-align: right;
      flex-shrink: 0;
    }

    /* Section header */
    .section-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px 10px;
    }

    .section-title {
      font-size: 13px;
      font-weight: 600;
      color: #FFFFFF;
    }

    .section-link {
      font-size: 11px;
      color: #AAFF00;
      cursor: pointer;
    }

    /* Feed */
    .feed {
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 16px;
    }

    .feed-card-large {
      background: #1A1A1A;
      border-radius: 14px;
      overflow: hidden;
    }

    .feed-img-large {
      width: 100%;
      height: 120px;
      background: #1C2418;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .feed-body-large {
      padding: 10px 14px 12px;
    }

    .feed-card-small {
      background: #1A1A1A;
      border-radius: 14px;
      overflow: hidden;
      display: flex;
      align-items: center;
    }

    .feed-img-small {
      width: 68px;
      height: 68px;
      flex-shrink: 0;
      background: #181E28;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .feed-body-small {
      padding: 10px 14px;
      flex: 1;
    }

    .feed-tag {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      background: #AAFF00;
      color: #111;
      padding: 3px 8px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 5px;
    }

    .feed-name {
      font-size: 13px;
      font-weight: 600;
      color: #FFF;
      margin-bottom: 2px;
    }

    .feed-meta {
      font-size: 11px;
      color: #555;
    }

    .feed-kcal {
      color: #AAFF00;
      font-weight: 600;
    }

    /* Log CTA */
    .log-cta {
      margin: 0 20px 16px;
      background: #1A1A1A;
      border-radius: 14px;
      border: 1px dashed #2A2A2A;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
      cursor: pointer;
    }

    .log-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #222;
      border: 1.5px dashed #333;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .log-icon svg {
      width: 16px;
      height: 16px;
    }

    .log-text-strong {
      font-size: 13px;
      color: #888;
      font-weight: 500;
      margin-bottom: 1px;
    }

    .log-text-sub {
      font-size: 11px;
      color: #444;
    }

    /* Stats grid */
    .stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      padding: 0 20px;
      margin-bottom: 10px;
    }

    .stat-card {
      background: #1A1A1A;
      border-radius: 12px;
      padding: 12px 14px;
    }

    .stat-label {
      font-size: 10px;
      color: #555;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 20px;
      font-weight: 700;
      color: #FFF;
    }

    .stat-value.accent {
      color: #AAFF00;
    }

    .stat-sub {
      font-size: 10px;
      color: #444;
      margin-top: 2px;
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #181818;
      border-top: 1px solid #222;
      display: flex;
      justify-content: space-around;
      padding: 10px 0 16px;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      flex: 1;
    }

    .nav-item svg {
      width: 22px;
      height: 22px;
    }

    .nav-item span {
      font-size: 10px;
      color: #555;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-item.active span {
      color: #AAFF00;
    }

    .nav-scan-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #AAFF00;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: -20px;
      box-shadow: 0 4px 16px rgba(170, 255, 0, 0.3);
      cursor: pointer;
    }

    .nav-scan-btn svg {
      width: 24px;
      height: 24px;
      color: #111;
    }
  </style>
</head>

  <script>
    function capitalize(str) {
      return str.charAt(0).toUpperCase() + str.slice(1);
    }

    function navTo(screen) {
      if (window.AppInventor) {
        window.AppInventor.setWebViewString('NAV:' + screen.toUpperCase());
      }
    }

    function updateDashboard(logs, userData) {
      var totalKcal = 0;
      var totalProtein = 0;
      var totalCarbs = 0;
      var totalFats = 0;
      var today = new Date().toLocaleDateString();

      logs.forEach(function (log) {
        if (log.date === today) {
          totalKcal += parseFloat(log.calories) || 0;
          totalProtein += parseFloat(log.protein) || 0;
          totalCarbs += parseFloat(log.carbs) || 0;
          totalFats += parseFloat(log.fat) || 0;
        }
      });

      var weight = parseFloat(userData.weight) || 70;
      var height = parseFloat(userData.height) || 170;
      var age = parseFloat(userData.age) || 24;
      var gender = userData.gender || "male";
      var goal = userData.goal || "maintain";

      var bmr = gender === "male"
        ? (10 * weight) + (6.25 * height) - (5 * age) + 5
        : (10 * weight) + (6.25 * height) - (5 * age) - 161;

      var tdee = bmr * 1.55;
      var goalKcal = goal === "lose" ? Math.round(tdee - 500)
        : goal === "gain" ? Math.round(tdee + 500)
          : Math.round(tdee);

      var goalProtein = Math.round(weight * 2);
      var goalCarbs = Math.round((goalKcal * 0.45) / 4);
      var goalFats = Math.round((goalKcal * 0.25) / 9);

      var totalKcalEl = document.getElementById("totalKcal");
      var progressRing = document.getElementById("progressRing");
      var proteinVal = document.getElementById("proteinVal");
      var carbsVal = document.getElementById("carbsVal");
      var fatsVal = document.getElementById("fatsVal");
      var proteinBar = document.getElementById("proteinBar");
      var carbsBar = document.getElementById("carbsBar");
      var fatsBar = document.getElementById("fatsBar");

      if (totalKcalEl) totalKcalEl.innerText = totalKcal.toLocaleString();
      if (progressRing) {
        var offset = 390 - (390 * Math.min(totalKcal / goalKcal, 1));
        progressRing.setAttribute("stroke-dashoffset", offset);
      }
      if (proteinVal) proteinVal.innerText = totalProtein + "g / " + goalProtein + "g";
      if (carbsVal) carbsVal.innerText = totalCarbs + "g / " + goalCarbs + "g";
      if (fatsVal) fatsVal.innerText = totalFats + "g / " + goalFats + "g";
      if (proteinBar) proteinBar.style.width = Math.min((totalProtein / goalProtein) * 100, 100) + "%";
      if (carbsBar) carbsBar.style.width = Math.min((totalCarbs / goalCarbs) * 100, 100) + "%";
      if (fatsBar) fatsBar.style.width = Math.min((totalFats / goalFats) * 100, 100) + "%";
    }

    window.addEventListener("load", function () {
      try {
        var raw = window.AppInventor.getWebViewString();
        if (!raw) return;

        var userData = {};
        var logsData = null;

        if (raw.indexOf("|LOGS|") !== -1) {
          var idx = raw.indexOf("|LOGS|");
          var uRaw = raw.substring(0, idx);
          var lRaw = raw.substring(idx + 6);
          if (uRaw) userData = JSON.parse(uRaw);
          if (lRaw && lRaw.length > 2) {
            var lParsed = JSON.parse(lRaw);
            logsData = lParsed.logs ? lParsed : { logs: lParsed };
          }
        } else if (raw.indexOf('"type":"save_log"') !== -1) {
          logsData = JSON.parse(raw);
        } else if (raw.indexOf('"name"') !== -1) {
          userData = JSON.parse(raw);
        }

        var profileEl = document.getElementById("profileName");
        if (userData.name && profileEl) profileEl.innerText = userData.name;

        if (logsData && logsData.logs && logsData.logs.length > 0) {
          var latest = logsData.logs[logsData.logs.length - 1];
          var foodNameEl = document.getElementById("feedFoodName");
          var mealTagEl = document.getElementById("feedMealTag");
          var metaEl = document.getElementById("feedMeta");
          var imgEl = document.getElementById("feedImgLarge");

          if (foodNameEl) foodNameEl.innerText = latest.foodName;
          if (mealTagEl) mealTagEl.innerText = capitalize(latest.meal);
          if (metaEl) metaEl.innerHTML =
            capitalize(latest.meal) + ' &middot; <span class="feed-kcal">' + latest.calories + ' kcal</span>';
          if (imgEl && latest.image) {
            imgEl.innerHTML = '<img src="' + latest.image + '" style="width:100%;height:120px;object-fit:cover;">';
          }
          updateDashboard(logsData.logs, userData);
        }
      } catch (e) { }
    });
  </script>
</body>

</html>
