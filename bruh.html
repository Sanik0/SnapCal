<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Food Analyzer (Hugging Face)</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0a0a0a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: #111;
      padding: 20px;
      border-radius: 12px;
      width: 350px;
      border: 1px solid #333;
    }

    input,
    button {
      width: 100%;
      margin-top: 10px;
      padding: 10px;
      border-radius: 8px;
      border: none;
    }

    input {
      background: #222;
      color: white;
    }

    button {
      background: orange;
      font-weight: bold;
      cursor: pointer;
    }

    #result {
      margin-top: 15px;
      font-size: 14px;
      color: #ccc;
      white-space: pre-wrap;
    }

    img {
      width: 100%;
      margin-top: 10px;
      border-radius: 10px;
    }
  </style>
</head>

<body>

  <div class="container">
    <h2>🍔 Food Analyzer</h2>

    <!-- API Key -->
    <input type="text" id="apiKey" placeholder="Enter HuggingFace API Key (optional)" />

    <!-- Image Upload -->
    <input type="file" id="imageInput" accept="image/*" />

    <button onclick="analyzeImage()">Analyze</button>

    <img id="preview" />

    <div id="result">Result will appear here...</div>
  </div>

  <script>
    async function analyzeImage() {
      const fileInput = document.getElementById("imageInput");
      const apiKey = document.getElementById("apiKey").value;
      const resultDiv = document.getElementById("result");

      if (!fileInput.files.length) {
        alert("Select an image");
        return;
      }

      const formData = new FormData();
      formData.append("image", fileInput.files[0]);
      formData.append("apiKey", apiKey);

      resultDiv.innerText = "Analyzing...";

      try {
        const response = await fetch("http://localhost/analyze.php", {
          method: "POST",
          body: formData
        });

        const data = await response.json();

        resultDiv.innerText = JSON.stringify(data, null, 2);
      } catch (err) {
        resultDiv.innerText = "Error: " + err.message;
      }
    }
  </script>

</body>

</html>
