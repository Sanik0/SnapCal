<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>SnapCal Logs</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #111111;
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding-bottom: 80px;
    }

    /* Top Nav */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
    }

    .topbar .menu-icon {
      display: flex;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
    }

    .topbar .menu-icon span {
      display: block;
      width: 22px;
      height: 2px;
      background: #FFFFFF;
      border-radius: 2px;
    }

    .topbar .logo {
      font-size: 18px;
      font-weight: 700;
      color: #FFFFFF;
      letter-spacing: 0.5px;
    }

    .topbar .avatar {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #333;
      border: 2px solid #AAFF00;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: #AAFF00;
    }

    /* Page Title */
    .page-title {
      font-size: 28px;
      font-weight: 800;
      color: #FFFFFF;
      padding: 4px 20px 16px;
    }

    /* Search */
    .search-wrap {
      padding: 0 20px 20px;
    }

    .search-box {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #1A1A1A;
      border-radius: 12px;
      padding: 12px 14px;
      border: 1px solid #222;
    }

    .search-box svg {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    .search-box input {
      background: none;
      border: none;
      outline: none;
      font-size: 14px;
      color: #FFFFFF;
      width: 100%;
      font-family: inherit;
    }

    .search-box input::placeholder {
      color: #444;
    }

    /* Day Group */
    .day-group {
      margin-bottom: 6px;
    }

    .day-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px 10px;
    }

    .day-label {
      font-size: 11px;
      font-weight: 700;
      color: #AAFF00;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }

    .day-total {
      font-size: 11px;
      color: #444;
      letter-spacing: 0.5px;
    }

    /* Meal Cards */
    .meal-list {
      padding: 0 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 16px;
    }

    .meal-card {
      background: #1A1A1A;
      border-radius: 14px;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 14px;
      cursor: pointer;
    }

    .meal-img {
      width: 54px;
      height: 54px;
      border-radius: 10px;
      background: #222;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .meal-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .meal-img svg {
      width: 24px;
      height: 24px;
    }

    .meal-info {
      flex: 1;
      min-width: 0;
    }

    .meal-name {
      font-size: 14px;
      font-weight: 600;
      color: #FFFFFF;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .meal-time {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      color: #555;
    }

    .meal-time svg {
      width: 11px;
      height: 11px;
      flex-shrink: 0;
    }

    .meal-kcal {
      font-size: 20px;
      font-weight: 700;
      color: #AAFF00;
      flex-shrink: 0;
    }

    /* Collapsed day */
    .day-collapsed {
      margin: 0 20px 16px;
      background: #1A1A1A;
      border-radius: 14px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
    }

    .day-collapsed-left {}

    .day-collapsed-label {
      font-size: 11px;
      font-weight: 700;
      color: #555;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .day-collapsed-count {
      font-size: 12px;
      color: #444;
    }

    .day-collapsed-link {
      font-size: 12px;
      font-weight: 600;
      color: #AAFF00;
      letter-spacing: 0.5px;
    }

    /* Bottom Nav */
    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: #181818;
      border-top: 1px solid #222;
      display: flex;
      justify-content: space-around;
      padding: 10px 0 16px;
    }

    .nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      cursor: pointer;
      flex: 1;
      text-decoration: none;
    }

    .nav-item svg {
      width: 22px;
      height: 22px;
    }

    .nav-item span {
      font-size: 10px;
      color: #555;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .nav-item.active span {
      color: #AAFF00;
    }

    .nav-scan-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #AAFF00;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-top: -20px;
      box-shadow: 0 4px 16px rgba(170, 255, 0, 0.3);
      cursor: pointer;
    }

    .nav-scan-btn svg {
      width: 24px;
      height: 24px;
      color: #111;
    }
  </style>
</head>

  </div>

  <!-- Page Title -->
  <div class="page-title">Meal History</div>

  <!-- Search -->
  <div class="search-wrap">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="2">
        <circle cx="11" cy="11" r="8" />
        <path d="M21 21l-4.35-4.35" />
      </svg>
      <input type="text" placeholder="Find specific foods..." id="searchInput" oninput="filterMeals(this.value)" />
    </div>
  </div>

  <div class="day-group">
    <div class="day-header">
      <span class="day-label" id="todayLabel">Today</span>
      <span class="day-total" id="todayTotal">0 kcal total</span>
    </div>
    <div class="meal-list" id="mealList">
      <!-- logs will be injected here -->
    </div>
  </div>

  <!-- Bottom Nav -->
  <div class="bottom-nav">
    <a class="nav-item" href="file:///android_asset/home.html" style="text-decoration:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="1.8">

  <script>
    var allLogs = [];

    function navTo(screen) {
      if (window.AppInventor) {
        window.AppInventor.setWebViewString('NAV:' + screen.toUpperCase());
      }
    }

    function viewLog(index) {
      var log = allLogs[index];
      log.type = "view_log";
      window.AppInventor.setWebViewString(JSON.stringify(log));
    }

    window.addEventListener("load", function () {
      try {
        var raw = window.AppInventor.getWebViewString();
        if (!raw) return;
        var data = JSON.parse(raw);
        if (!data.logs || data.logs.length === 0) return;

        allLogs = data.logs;

        var totalKcal = 0;
        var mealList = document.getElementById("mealList");
        mealList.innerHTML = "";

        data.logs.forEach(function (log, index) {
          totalKcal += parseFloat(log.calories) || 0;

          var imgContent = log.image
            ? '<img src="' + log.image + '" style="width:100%;height:100%;object-fit:cover;border-radius:10px;">'
            : '<svg viewBox="0 0 24 24" fill="none" stroke="#2A3A24" stroke-width="1.2"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>';

          mealList.innerHTML += '<div class="meal-card" onclick="viewLog(' + index + ')">' +
            '<div class="meal-img">' + imgContent + '</div>' +
            '<div class="meal-info">' +
            '<div class="meal-name">' + log.foodName + '</div>' +
            '<div class="meal-time">' +
            '<svg viewBox="0 0 24 24" fill="none" stroke="#555" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>' +
            log.time +
            '</div>' +
            '</div>' +
            '<div class="meal-kcal">' + log.calories + '</div>' +
            '</div>';
        });

        document.getElementById("todayTotal").innerText = totalKcal.toLocaleString() + " kcal total";
      } catch (e) { }
    });
  </script>

</html>
