<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log Detail</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background: #111;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      padding-bottom: 40px;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px 12px;
    }

    .back-btn {
      width: 34px;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .topbar-title {
      font-size: 17px;
      font-weight: 700;
    }

    .topbar-date {
      font-size: 12px;
      color: #555;
    }

    .section-label {
      font-size: 10px;
      color: #555;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      padding: 0 20px;
      margin-bottom: 10px;
      margin-top: 20px;
    }

    .food-img-wrap {
      margin: 0 20px;
      border-radius: 14px;
      overflow: hidden;
      height: 160px;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .food-img-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .no-image-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .form-card {
      background: #1a1a1a;
      border-radius: 14px;
      margin: 0 20px;
      overflow: hidden;
    }

    .form-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #222;
      gap: 12px;
    }

    .form-row:last-child {
      border-bottom: none;
    }

    .form-row-label {
      font-size: 13px;
      color: #777;
      font-weight: 500;
      flex-shrink: 0;
      min-width: 90px;
    }

    .form-value {
      font-size: 14px;
      color: #fff;
      text-align: right;
      flex: 1;
    }

    .form-unit {
      font-size: 12px;
      color: #555;
      margin-left: 4px;
      flex-shrink: 0;
    }

    .kcal-card {
      background: #1a1a1a;
      border-radius: 14px;
      margin: 0 20px;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .kcal-label {
      font-size: 13px;
      color: #888;
    }

    .kcal-right {
      display: flex;
      align-items: baseline;
      gap: 6px;
    }

    .kcal-value {
      font-size: 28px;
      font-weight: 800;
      color: #AAFF00;
    }

    .kcal-unit-label {
      font-size: 12px;
      color: #555;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .macro-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      padding: 0 20px;
    }

    .macro-card {
      background: #1a1a1a;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }

    .macro-label {
      font-size: 10px;
      color: #555;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .macro-value {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      border-bottom: 1px solid #333;
      padding-bottom: 4px;
    }

    .macro-unit {
      font-size: 10px;
      color: #555;
      margin-top: 4px;
    }

    .meal-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      padding: 0 20px;
    }

    .meal-opt {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      padding: 12px;
      text-align: center;
      opacity: 0.4;
    }

    .meal-opt.selected {
      border-color: #AAFF00;
      background: #1C2210;
      opacity: 1;
    }

    .meal-opt-icon {
      font-size: 22px;
      margin-bottom: 5px;
    }

    .meal-opt-label {
      font-size: 12px;
      color: #888;
      font-weight: 600;
    }

    .meal-opt.selected .meal-opt-label {
      color: #AAFF00;
    }

    .notes-card {
      background: #1a1a1a;
      border-radius: 14px;
      margin: 0 20px;
      padding: 14px 16px;
    }

    .notes-text {
      font-size: 14px;
      color: #777;
      line-height: 1.6;
    }

    .info-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 20px;
      margin-top: 20px;
      margin-bottom: 4px;
    }

    .info-badge {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      color: #555;
    }

    .info-badge span {
      color: #AAFF00;
      font-weight: 600;
    }

    .btn-back {
      width: calc(100% - 40px);
      margin: 20px 20px 0;
      background: #1a1a1a;
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 16px;
      cursor: pointer;
      text-align: center;
    }
  </style>
</head>

<body>

  <div class="topbar">
    <div class="back-btn" onclick="navTo('LOGS')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2">
        <path d="M19 12H5M12 19l-7-7 7-7" />
      </svg>
    </div>
    <div class="topbar-title">Log Detail</div>
    <div class="topbar-date" id="logDate">--</div>
  </div>

  <!-- Image -->
  <div class="section-label">Food photo</div>
  <div class="food-img-wrap" id="foodImgWrap">
    <div class="no-image-placeholder">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#444" stroke-width="1.5">
        <rect x="3" y="3" width="18" height="18" rx="3" />
        <circle cx="8.5" cy="8.5" r="1.5" />
        <path d="M21 15l-5-5L5 21" />
      </svg>
      <span style="font-size:12px;color:#444;">No photo</span>
    </div>
  </div>

  <!-- Food Info -->
  <div class="section-label">Food info</div>
  <div class="form-card">
    <div class="form-row">
      <div class="form-row-label">Food name</div>
      <div class="form-value" id="detailFoodName">--</div>
    </div>
    <div class="form-row">
      <div class="form-row-label">Serving size</div>
      <div class="form-value" id="detailServing">--</div>
      <span class="form-unit">g</span>
    </div>
  </div>

  <!-- Calories -->
  <div class="section-label">Calories</div>
  <div class="kcal-card">
    <div class="kcal-label">Total calories</div>
    <div class="kcal-right">
      <div class="kcal-value" id="detailCalories">0</div>
      <span class="kcal-unit-label">kcal</span>
    </div>
  </div>

  <!-- Macros -->
  <div class="section-label">Macronutrients</div>
  <div class="macro-grid">
    <div class="macro-card">
      <div class="macro-label">Protein</div>
      <div class="macro-value" id="detailProtein">0</div>
      <div class="macro-unit">grams</div>
    </div>
    <div class="macro-card">
      <div class="macro-label">Carbs</div>
      <div class="macro-value" id="detailCarbs">0</div>
      <div class="macro-unit">grams</div>
    </div>
    <div class="macro-card">
      <div class="macro-label">Fat</div>
      <div class="macro-value" id="detailFat">0</div>
      <div class="macro-unit">grams</div>
    </div>
  </div>

  <!-- Meal Type -->
  <div class="section-label">Meal type</div>
  <div class="meal-grid">
    <div class="meal-opt" id="meal-breakfast">
      <div class="meal-opt-icon">🌅</div>
      <div class="meal-opt-label">Breakfast</div>
    </div>
    <div class="meal-opt" id="meal-lunch">
      <div class="meal-opt-icon">☀️</div>
      <div class="meal-opt-label">Lunch</div>
    </div>
    <div class="meal-opt" id="meal-dinner">
      <div class="meal-opt-icon">🌙</div>
      <div class="meal-opt-label">Dinner</div>
    </div>
    <div class="meal-opt" id="meal-snack">
      <div class="meal-opt-icon">🍎</div>
      <div class="meal-opt-label">Snack</div>
    </div>
  </div>

  <!-- Notes -->
  <div class="section-label">Notes</div>
  <div class="notes-card">
    <div class="notes-text" id="detailNotes">No notes added.</div>
  </div>

  <!-- Time info -->
  <div class="info-row">
    <div class="info-badge">Logged at <span id="detailTime">--</span></div>
    <div class="info-badge">Date: <span id="detailDateBadge">--</span></div>
  </div>

  <button class="btn-back" onclick="navTo('LOGS')">← Back to Logs</button>

  <script>
    function navTo(screen) {
      if (window.AppInventor) {
        window.AppInventor.setWebViewString('NAV:' + screen.toUpperCase());
      }
    }

    window.addEventListener("load", function () {
      try {
        var raw = window.AppInventor.getWebViewString();
        if (!raw) return;

        var log = JSON.parse(raw);
        if (!log.foodName) return;

        // image
        if (log.image) {
          document.getElementById("foodImgWrap").innerHTML =
            '<img src="' + log.image + '">';
        }

        // food info
        document.getElementById("detailFoodName").innerText = log.foodName || "--";
        document.getElementById("detailServing").innerText = log.servingSize || "--";
        document.getElementById("detailCalories").innerText = log.calories || "0";
        document.getElementById("detailProtein").innerText = log.protein || "0";
        document.getElementById("detailCarbs").innerText = log.carbs || "0";
        document.getElementById("detailFat").innerText = log.fat || "0";
        document.getElementById("detailNotes").innerText = log.notes || "No notes added.";
        document.getElementById("detailTime").innerText = log.time || "--";
        document.getElementById("detailDateBadge").innerText = log.date || "--";
        document.getElementById("logDate").innerText = log.date || "--";

        // meal type highlight
        var meals = ["breakfast", "lunch", "dinner", "snack"];
        meals.forEach(function (m) {
          var el = document.getElementById("meal-" + m);
          if (el && m === log.meal) el.classList.add("selected");
        });

      } catch (e) { }
    });
  </script>

</body>

</html>
